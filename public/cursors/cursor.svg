<svg xmlns="http://www.w3.org/2000/svg" width="40" height="32" viewBox="0 0 40 32">
  <!-- Shiro (シロ) from Crayon Shin-chan - lying down pose -->
  <!-- Tail (curled up) -->
  <path d="M5 10 Q2 6 5 4 Q8 2 9 5" fill="white" stroke="#222" stroke-width="1.2" stroke-linecap="round" fill-rule="evenodd"/>
  <!-- Body (elongated lying down) -->
  <ellipse cx="18" cy="20" rx="15" ry="9" fill="white" stroke="#222" stroke-width="1.2"/>
  <!-- Back legs (little nubs at rear) -->
  <ellipse cx="6" cy="26" rx="3" ry="2.5" fill="white" stroke="#222" stroke-width="1"/>
  <!-- Front legs -->
  <ellipse cx="28" cy="27" rx="3" ry="2.5" fill="white" stroke="#222" stroke-width="1"/>
  <!-- Head (overlapping body on right side) -->
  <ellipse cx="30" cy="15" rx="9" ry="10" fill="white" stroke="#222" stroke-width="1.2"/>
  <!-- Head fill to clean up body overlap -->
  <ellipse cx="30" cy="15" rx="8" ry="9" fill="white"/>
  <!-- Left ear (floppy) -->
  <path d="M22 9 Q20 3 23 5 Q24 7 23 9" fill="white" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <!-- Right ear (floppy) -->
  <path d="M36 7 Q39 2 38 5 Q37 8 36 9" fill="white" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <!-- Left eye -->
  <ellipse cx="27" cy="13" rx="2.2" ry="2.8" fill="none" stroke="#222" stroke-width="1.2"/>
  <circle cx="27" cy="13.5" r="1" fill="#222"/>
  <!-- Right eye -->
  <ellipse cx="33" cy="13" rx="2.2" ry="2.8" fill="none" stroke="#222" stroke-width="1.2"/>
  <circle cx="33" cy="13.5" r="1" fill="#222"/>
  <!-- Eyebrows -->
  <path d="M25 9.5 Q27 8.5 29 9.5" fill="none" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <path d="M31 9.5 Q33 8.5 35 9.5" fill="none" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="30" cy="17" rx="1.5" ry="1" fill="#222"/>
  <!-- Mouth -->
  <path d="M27.5 19.5 Q30 21 32.5 19.5" fill="none" stroke="#222" stroke-width="1" stroke-linecap="round"/>
</svg>
