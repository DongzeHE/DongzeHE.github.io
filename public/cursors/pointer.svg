<svg xmlns="http://www.w3.org/2000/svg" width="40" height="32" viewBox="0 0 40 32">
  <!-- Shiro pointer - ears perked, excited face -->
  <!-- Tail (wagging up) -->
  <path d="M4 12 Q1 6 4 3 Q7 1 8 4" fill="white" stroke="#222" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="18" cy="20" rx="15" ry="9" fill="white" stroke="#222" stroke-width="1.2"/>
  <!-- Back legs -->
  <ellipse cx="6" cy="26" rx="3" ry="2.5" fill="white" stroke="#222" stroke-width="1"/>
  <!-- Front legs (one raised) -->
  <ellipse cx="29" cy="27" rx="3" ry="2.5" fill="white" stroke="#222" stroke-width="1"/>
  <ellipse cx="26" cy="24" rx="2.5" ry="2" fill="white" stroke="#222" stroke-width="1" transform="rotate(-30 26 24)"/>
  <!-- Head -->
  <ellipse cx="30" cy="14" rx="9" ry="10" fill="white" stroke="#222" stroke-width="1.2"/>
  <ellipse cx="30" cy="14" rx="8" ry="9" fill="white"/>
  <!-- Left ear (perked) -->
  <path d="M22 8 Q20 1 24 4 Q25 6 23 8" fill="white" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <!-- Right ear (perked) -->
  <path d="M36 6 Q39 0 38 4 Q37 7 36 8" fill="white" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <!-- Left eye (happy squint) -->
  <path d="M25 12 Q27 10.5 29 12" fill="none" stroke="#222" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Right eye (open, excited) -->
  <ellipse cx="33" cy="12" rx="2.2" ry="2.8" fill="none" stroke="#222" stroke-width="1.2"/>
  <circle cx="33" cy="12.5" r="1" fill="#222"/>
  <!-- Eyebrow -->
  <path d="M31 8.5 Q33 7.5 35 8.5" fill="none" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="30" cy="16" rx="1.5" ry="1" fill="#222"/>
  <!-- Open mouth with tongue -->
  <path d="M27 18.5 Q30 21.5 33 18.5" fill="none" stroke="#222" stroke-width="1" stroke-linecap="round"/>
  <ellipse cx="30" cy="20" rx="2" ry="1.5" fill="#ffaaaa"/>
</svg>
